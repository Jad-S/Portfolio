<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- J -->
  <text x="28%" y="52%" dominant-baseline="middle" text-anchor="middle" font-size="32" font-family="Arial, sans-serif" fill="#ff4500" font-weight="bold">
    J
  </text>

  <!-- < -->
  <text x="55%" y="52%" dominant-baseline="middle" text-anchor="middle" font-size="26" font-family="monospace" fill="black">
    &lt;
  </text>

  <!-- / -->
  <text x="65%" y="52%" dominant-baseline="middle" text-anchor="middle" font-size="26" font-family="monospace" fill="#ff4500">
